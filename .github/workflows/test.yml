name: Test Bilibili Transcriber

# 权限设置
permissions:
  contents: write
  actions: write
  checks: write

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Test imports
      run: |
        python test_install.py
    
    - name: Run basic tests
      run: |
        python -c "
        from bilibili_transcriber import BilibiliTranscriber
        print('✅ BilibiliTranscriber imported successfully')
        
        from bilibili_transcriber import ProcessingResult, VideoInfo, TranscriptSegment
        print('✅ All classes imported successfully')
        "